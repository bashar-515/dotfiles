set -g default-terminal "screen-256color"

set -g default-command "/opt/homebrew/bin/bash"
set -g default-shell "/opt/homebrew/bin/bash"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind-key - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r l resize-pane -R 2
bind -r h resize-pane -L 2

bind -r m resize-pane -Z

set -g mouse on

set-option -a terminal-features 'xterm-256color:RGB'

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fenetikm/falcon'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes

source-file ~/.tmux/plugins/falcon/tmux/falcon.tmux.conf

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

# initalize tpm (keep this line at the very bottom of this file)
run '~/.tmux/plugins/tpm/tpm'
